<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird - العصفور الأزرق</title>
    <style>
        /* تنسيقات الصفحة */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #70c5ce; /* خلفية السماء */
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background-color: #fff;
            overflow: hidden;
            border: 2px solid #000;
        }

        #bird {
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: #00f; /* لون العصفور الأزرق */
            border-radius: 50%;
            top: 300px;
            left: 50px;
        }

        .pipe {
            position: absolute;
            width: 50px;
            background-color: #0a0;
            bottom: 0;
        }

        .pipe-top {
            top: 0;
            transform: rotate(180deg);
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="bird"></div>
        <div id="pipes"></div>
    </div>

    <script>
        // JavaScript للعبة
        const bird = document.getElementById("bird");
        const gameContainer = document.getElementById("game-container");
        const pipesContainer = document.getElementById("pipes");

        let birdPosition = 300; // موقع العصفور على المحور Y
        let gravity = 2; // قوة الجاذبية
        let isGameOver = false;

        // تفعيل القفز عند الضغط على أي مفتاح
        document.addEventListener("keydown", () => {
            if (!isGameOver) {
                birdPosition -= 50; // تحريك العصفور للأعلى
            }
        });

        // إنشاء الأنابيب بشكل عشوائي
        function createPipe() {
            const pipeGap = 150; // المسافة بين الأنابيب العلوية والسفلية
            const pipeHeight = Math.random() * 300 + 50; // ارتفاع الأنبوب السفلي

            const pipeTop = document.createElement("div");
            pipeTop.classList.add("pipe", "pipe-top");
            pipeTop.style.height = pipeHeight + "px";
            pipeTop.style.left = "400px";

            const pipeBottom = document.createElement("div");
            pipeBottom.classList.add("pipe");
            pipeBottom.style.height = 600 - pipeHeight - pipeGap + "px";
            pipeBottom.style.left = "400px";

            pipesContainer.appendChild(pipeTop);
            pipesContainer.appendChild(pipeBottom);

            // تحريك الأنابيب
            function movePipes() {
                if (isGameOver) return;

                const currentLeft = parseInt(window.getComputedStyle(pipeTop).left);
                if (currentLeft <= -50) {
                    pipesContainer.removeChild(pipeTop);
                    pipesContainer.removeChild(pipeBottom);
                } else {
                    pipeTop.style.left = currentLeft - 2 + "px";
                    pipeBottom.style.left = currentLeft - 2 + "px";
                }

                // التحقق من التصادم
                checkCollision(pipeTop, pipeBottom);
            }

            setInterval(movePipes, 20);
        }

        // التحقق من التصادم
        function checkCollision(pipeTop, pipeBottom) {
            const birdRect = bird.getBoundingClientRect();
            const topRect = pipeTop.getBoundingClientRect();
            const bottomRect = pipeBottom.getBoundingClientRect();

            if (
                birdRect.right > topRect.left &&
                birdRect.left < topRect.right &&
                birdRect.bottom > topRect.top
            ) {
                gameOver();
            }

            if (
                birdRect.right > bottomRect.left &&
                birdRect.left < bottomRect.right &&
                birdRect.top < bottomRect.bottom
            ) {
                gameOver();
            }
        }

        // إنهاء اللعبة
        function gameOver() {
            isGameOver = true;
            alert("لقد خسرت! اضغط على 'موافق' لإعادة المحاولة.");
            location.reload(); // إعادة تحميل الصفحة
        }

        // تحديث موقع العصفور باستمرار
        function updateBirdPosition() {
            if (!isGameOver) {
                birdPosition += gravity;
                bird.style.top = birdPosition + "px";

                // التحقق من السقوط
                if (birdPosition >= 600) {
                    gameOver();
                }

                requestAnimationFrame(updateBirdPosition);
            }
        }

        // إنشاء الأنابيب بشكل دوري
        setInterval(createPipe, 2000);

        // بدء اللعبة
        updateBirdPosition();
    </script>
</body>
</html>
