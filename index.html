<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المواد الكيميائية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Tajawal', sans-serif;
        }
        h1, h2 {
            color: #2c3e50;
            font-weight: bold;
        }
        .form-container, .table-container, .statistics {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        .btn-custom {
            background-color: #3498db;
            color: #ffffff;
            border: none;
            transition: background-color 0.3s ease;
        }
        .btn-custom:hover {
            background-color: #2980b9;
        }
        .btn-delete {
            background-color: #e74c3c;
            color: #ffffff;
            border: none;
            transition: background-color 0.3s ease;
        }
        .btn-delete:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

<div class="container my-5">
    <h1 class="text-center mb-4">إدارة المواد الكيميائية</h1>
    <div class="form-container">
        <form id="addProductForm">
            <div class="mb-3">
                <label for="productName" class="form-label">اسم المادة:</label>
                <input type="text" class="form-control" id="productName" required>
            </div>
            <div class="mb-3">
                <label for="notes" class="form-label">الملاحظات:</label>
                <input type="text" class="form-control" id="notes" required>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="internalQuantity" class="form-label">الكمية في المستودع الداخلي:</label>
                    <input type="number" class="form-control" id="internalQuantity" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="externalQuantity" class="form-label">الكمية في المستودع الخارجي:</label>
                    <input type="number" class="form-control" id="externalQuantity" required>
                </div>
            </div>
            <button type="submit" class="btn btn-custom w-100">إضافة مادة</button>
        </form>
    </div>

    <button class="btn btn-success w-100" onclick="saveDataToLocalStorage()">حفظ البيانات</button>

    <div class="table-container">
        <h2 class="mb-4">قائمة المواد الكيميائية</h2>
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>اسم المادة</th>
                    <th>الملاحظات</th>
                    <th>الكمية الداخلية</th>
                    <th>الكمية الخارجية</th>
                    <th>المجموع</th>
                    <th>تاريخ آخر تعديل</th>
                    <th>إجراءات</th>
                </tr>
            </thead>
            <tbody id="productTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem('products')) || [];

    document.getElementById('addProductForm').addEventListener('submit', function(event) {
        event.preventDefault();

        let productName = document.getElementById('productName').value;
        let notes = document.getElementById('notes').value;
        let internalQuantity = parseInt(document.getElementById('internalQuantity').value);
        let externalQuantity = parseInt(document.getElementById('externalQuantity').value);
        let total = internalQuantity + externalQuantity;
        let lastModified = new Date().toLocaleString();

        const product = { name: productName, notes, internalQuantity, externalQuantity, total, lastModified };
        products.push(product);

        updateTable();
        localStorage.setItem('products', JSON.stringify(products));
        document.getElementById('addProductForm').reset();
    });

    function updateTable() {
        const tbody = document.getElementById('productTableBody');
        tbody.innerHTML = '';
        products.forEach((product, index) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${product.name}</td>
                <td>${product.notes}</td>
                <td>${product.internalQuantity}</td>
                <td>${product.externalQuantity}</td>
                <td>${product.total}</td>
                <td>${product.lastModified}</td>
                <td><button class="btn btn-delete btn-sm" onclick="deleteProduct(${index})">حذف</button></td>
            `;
            tbody.appendChild(row);
        });
    }

    function deleteProduct(index) {
        products.splice(index, 1);
        updateTable();
        localStorage.setItem('products', JSON.stringify(products));
    }

    function saveDataToLocalStorage() {
        localStorage.setItem('products', JSON.stringify(products));
        alert("تم حفظ البيانات بنجاح!");
    }

    updateTable();
</script>

</body>
</html>
